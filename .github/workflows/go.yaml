name: Go

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      mods: ${{ steps.list.outputs.mods }}
      changed: ${{ steps.changed.outputs.mods }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - id: list
        run: echo "mods=$(ls -d *mod | jq -R . | jq -s -c .)" >> "$GITHUB_OUTPUT"

      - id: changed
        run: |
          changed=()
          for m in *mod; do
            last=$(git tag --list "$m/v*" | sort -V | tail -1)
            if [ -z "$last" ] || ! git diff --quiet "$last"..HEAD -- "$m/"; then
              changed+=("$m")
            fi
          done
          if [ ${#changed[@]} -eq 0 ]; then
            echo "mods=[]" >> "$GITHUB_OUTPUT"
          else
            echo "mods=$(printf '%s\n' "${changed[@]}" | jq -R . | jq -s -c .)" >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mod: ${{ fromJSON(needs.discover.outputs.mods) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: ./${{ matrix.mod }}/go.mod
          cache-dependency-path: ./${{ matrix.mod }}/go.sum

      - name: Tidy check
        run: make tidy-check/${{ matrix.mod }}

      - name: Lint
        run: make lint/${{ matrix.mod }}

      - name: API check
        run: make api-check/${{ matrix.mod }}

      - name: Cross-compile
        run: make cross-check/${{ matrix.mod }}

      - name: Test
        run: make test/${{ matrix.mod }}

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./.output/coverage/${{ matrix.mod }}.txt
          flags: ${{ matrix.mod }}

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./.output/junit/${{ matrix.mod }}.xml
          flags: ${{ matrix.mod }}

  tag:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.discover.outputs.changed != '[]' }}
    needs:
      - discover
      - test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        mod: ${{ fromJSON(needs.discover.outputs.changed) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.BOT_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: ./${{ matrix.mod }}/go.mod
          cache-dependency-path: ./${{ matrix.mod }}/go.sum

      - name: Tag
        run: make tag/${{ matrix.mod }}

      - name: Push tag
        run: |
          tag=$(git tag --points-at HEAD --list '${{ matrix.mod }}/v*' | head -1)
          [ -z "$tag" ] && exit 0
          git ls-remote --exit-code origin "refs/tags/$tag" >/dev/null 2>&1 || git push origin "$tag"

  ci:
    needs:
      - discover
      - test
      - tag
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify
        run: |
          [ "${{ needs.discover.result }}" = "success" ] || exit 1
          case "${{ needs.test.result }}" in success|skipped) ;; *) exit 1 ;; esac
          case "${{ needs.tag.result }}"  in success|skipped) ;; *) exit 1 ;; esac
