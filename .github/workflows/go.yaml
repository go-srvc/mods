name: Go

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      mods: ${{ steps.changed.outputs.mods }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - id: changed
        run: |
          changed=()
          for m in *mod; do
            last=$(git tag --list "$m/v*" | sort -V | tail -1)
            if [ -z "$last" ] || ! git diff --quiet "$last"..HEAD -- "$m/"; then
              changed+=("$m")
            fi
          done
          echo "mods=$(printf '%s\n' "${changed[@]}" | jq -R . | jq -s -c .)" >> "$GITHUB_OUTPUT"

  test:
    needs: discover
    if: ${{ needs.discover.outputs.mods != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mod: ${{ fromJSON(needs.discover.outputs.mods) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: ./${{ matrix.mod }}/go.mod
          cache-dependency-path: ./${{ matrix.mod }}/go.sum

      - name: Tidy check
        run: make tidy-check/${{ matrix.mod }}

      - name: Lint
        run: make lint/${{ matrix.mod }}

      - name: API check
        run: make api-check/${{ matrix.mod }}

      - name: Test
        run: make test/${{ matrix.mod }}

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./.output/coverage/${{ matrix.mod }}.txt
          flags: ${{ matrix.mod }}

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./.output/junit/${{ matrix.mod }}.xml
          flags: ${{ matrix.mod }}

  tag:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.discover.outputs.mods != '[]' }}
    needs:
      - discover
      - test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        mod: ${{ fromJSON(needs.discover.outputs.mods) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: ./${{ matrix.mod }}/go.mod
          cache-dependency-path: ./${{ matrix.mod }}/go.sum

      - name: Tag
        run: make tag/${{ matrix.mod }}

      - name: Push tag and create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag=$(git tag --points-at HEAD --list '${{ matrix.mod }}/v*' | head -1)
          [ -z "$tag" ] && exit 0
          git push origin "$tag"
          gh release create "$tag" --title "$tag" --generate-notes
